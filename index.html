<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life Sanctuary Church Slides</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <main class="slideshow-shell">
      <section class="slideshow" aria-label="Life Sanctuary Church announcement slideshow">
        <div class="slide-status" id="slideStatus" aria-live="polite"></div>
        <nav class="slide-controls" aria-label="Slide controls">
          <button class="btn btn-light control-button" type="button" id="prevSlide" aria-label="Previous slide">
            <span aria-hidden="true">&larr;</span>
          </button>
          <div class="slide-dots" id="slideDots" aria-label="Choose slide"></div>
          <button class="btn btn-light control-button" type="button" id="nextSlide" aria-label="Next slide">
            <span aria-hidden="true">&rarr;</span>
          </button>
        </nav>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
